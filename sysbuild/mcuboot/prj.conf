CONFIG_MAIN_STACK_SIZE=10240
# Flash
CONFIG_FLASH=y

# MCUBoot serial
CONFIG_MCUBOOT_SERIAL=y
CONFIG_MCUBOOT_SERIAL_DIRECT_IMAGE_UPLOAD=y

# CHOICE: Serial Device
#CONFIG_BOOT_SERIAL_UART=y
CONFIG_BOOT_SERIAL_CDC_ACM=y
# ENDCHOICE: Serial Device

# MCUBoot USB Serial device
#CONFIG_BOOT_SERIAL_CDC_ACM=y

# Decrease memory footprint
CONFIG_CBPRINTF_NANO=y
CONFIG_CONSOLE=n
CONFIG_CONSOLE_HANDLER=n
CONFIG_UART_CONSOLE=n
CONFIG_RTT_CONSOLE=n
CONFIG_USE_SEGGER_RTT=n
CONFIG_LOG=n

# Make MCUBoot as small as possible
CONFIG_SIZE_OPTIMIZATIONS=y

# The following configurations are required to support serial recovery of the
# network image
CONFIG_PCD_APP=y

CONFIG_FLASH_SIMULATOR=y
CONFIG_FLASH_SIMULATOR_DOUBLE_WRITES=y
CONFIG_FLASH_SIMULATOR_STATS=n

CONFIG_BOOT_IMAGE_ACCESS_HOOKS=y
CONFIG_NRF53_RECOVERY_NETWORK_CORE=y

# Devkit doesn't have an LED to indicate :(
# CONFIG_MCUBOOT_INDICATION_LED=y

CONFIG_OUTPUT_PRINT_MEMORY_USAGE=y

CONFIG_PM_PARTITION_SIZE_MCUBOOT=0x10000
