# Proto0-specific mcuboot overrides.
#
# The proto0 board DTS exposes an enabled QSPI node (MX25R6435F), which causes
# CONFIG_NORDIC_QSPI_NOR to be auto-selected (default y). mcuboot does not use
# the external QSPI flash — the secondary OTA slot is on internal flash backed
# by the flash simulator. Disable the driver to keep mcuboot within its flash
# partition budget.
CONFIG_NORDIC_QSPI_NOR=n
