# DK-specific Kconfig overrides.
# Picked up automatically by west build when targeting rgb_sunglasses_dk/nrf5340/cpuapp.

# Enable statistics commands
# Disabled to save ROM
CONFIG_MCUMGR_GRP_STAT=n

# Enable shell-over-MCUmgr
# Disabled to save ROM
CONFIG_MCUMGR_GRP_SHELL=n

# Enable zephyr basic commands
# Disabled to save ROM
CONFIG_MCUMGR_GRP_ZBASIC=n

# Enable settings management
# Disabled to save ROM
CONFIG_MCUMGR_GRP_SETTINGS=n

# Enable SMP OS management group commands
# Disabled to save ROM
CONFIG_MCUMGR_GRP_OS=n
CONFIG_MCUMGR_GRP_OS_INFO=n
CONFIG_MCUMGR_GRP_OS_ECHO=n
CONFIG_MCUMGR_GRP_OS_TASKSTAT=n

# Enable file-system management group commands
# TODO: recommended to implement ACLs using MCUMGR_GRP_FS_FILE_ACCESS_HOOK
CONFIG_MCUMGR_GRP_FS=n

# Disable shell commands that are not needed
CONFIG_CLOCK_CONTROL_NRF_SHELL=n
CONFIG_DEVICE_SHELL=n
CONFIG_DEVMEM_SHELL=n
CONFIG_FLASH_SHELL=n

# Minimize Shell memory usage
CONFIG_SHELL_MINIMAL=y

# Enable the microphone driver
CONFIG_VM3011=y

# Enable audio subsystem support
CONFIG_AUDIO=y

# Enable the generic PDM / DMIC interface
CONFIG_AUDIO_DMIC=y