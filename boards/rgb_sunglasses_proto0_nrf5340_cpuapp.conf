# Proto0-specific Kconfig overrides.
# Picked up automatically by west build when targeting rgb_sunglasses_proto0/nrf5340/cpuapp.

# BMI270 6-axis IMU (not present on rgb_sunglasses_dk)
CONFIG_SENSOR=y
CONFIG_BMI270=y

# MX25R6435F QSPI NOR flash (not present on rgb_sunglasses_dk)
CONFIG_NORDIC_QSPI_NOR=y
# PM_DEVICE required for deep-power-down (has-dpd in DTS)
CONFIG_PM_DEVICE=y

CONFIG_FLASH_SHELL=y

# Enable the LittleFS file system.
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y

# Enable audio subsystem support
CONFIG_AUDIO=y

# Enable the generic PDM / DMIC interface
CONFIG_AUDIO_DMIC=y