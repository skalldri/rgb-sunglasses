name: 'build' 
on:
  pull_request:
    paths:
      - 'fw/**'
      - '.github/workflows/**'
      - '.devcontainer/**'
  push:
    branches:
      - main
    paths:
      - 'fw/**'
      - '.github/workflows/**'
      - '.devcontainer/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # The legacy rgb_sunglasses_dk board is no longer built on main (issue #203);
  # its board support and CI live on the dk-support branch.
  build-proto0:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Needed by the firmware size-impact comment step on pull_request runs.
      # Fork PRs get a read-only token, so that step is best-effort (see below).
      pull-requests: write
    steps:
      # Canary for disk exhaustion: runners currently have ~90 GB free, the
      # devcontainer image needs ~25 GB, so no "free up space" purge is needed.
      # If a run ever hits ENOSPC, check this step's output first.
      - name: Check HDD space
        run: df -h

      - name: Checkout (GitHub)
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and run dev container task
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          cacheFrom: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          configFile: .devcontainer/ci/devcontainer.json
          # filter (+ default eventFilterForPush: push) = only push events — i.e.
          # merges to main — refresh :latest; PR jobs must never overwrite it.
          push: filter
          # Tee the pristine build so a host-side step can read the linker's
          # "--print-memory-usage" table (fw/build.log). bash + pipefail so a
          # failed `west build` still fails the step despite the `| tee`.
          runCmd: >-
            bash -euo pipefail -c "west build --build-dir /workspaces/rgb-sunglasses/fw/build /workspaces/rgb-sunglasses/fw --pristine --board rgb_sunglasses_proto0/nrf5340/cpuapp --sysbuild -- -DBOARD_ROOT=/workspaces/rgb-sunglasses/fw 2>&1 | tee /workspaces/rgb-sunglasses/fw/build.log && west build --build-dir /workspaces/rgb-sunglasses/fw/build --domain fw -t llext-edk && /workspaces/rgb-sunglasses/fw/extensions/build.sh /workspaces/rgb-sunglasses/fw/build"

      # --- Firmware ROM/RAM impact report (proto0 appcore) ---
      # Parse runs on every trigger; the build log is root-owned (created inside
      # the devcontainer), so we only READ it and write the JSON to fw/ (which
      # the runner owns) rather than the root-owned fw/build/.
      - name: Parse firmware size
        run: python3 fw/scripts/fw_size_report.py parse --log fw/build.log --out fw/size.json

      # On push-to-main, stash this build's numbers as the baseline future PRs
      # diff against. Unique key per run (caches are immutable); PRs fetch the
      # newest via the restore-keys prefix below.
      - name: Save size baseline (main)
        if: github.event_name == 'push'
        run: cp fw/size.json fw/baseline-size.json
      - name: Cache size baseline (main)
        if: github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: fw/baseline-size.json
          key: fw-size-baseline-main-${{ github.run_id }}

      # On a PR, restore the newest main baseline. Default-branch caches are
      # readable from PR runs. A miss (first rollout / expiry) is fine — the
      # diff step then reports absolute numbers only.
      - name: Restore size baseline (PR)
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: fw/baseline-size.json
          key: fw-size-baseline-main-${{ github.run_id }}
          restore-keys: |
            fw-size-baseline-main-

      - name: Render size comment (PR)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: python3 fw/scripts/fw_size_report.py diff --base fw/baseline-size.json --head fw/size.json --out fw/size-comment.md

      # Sticky comment: upsert the one carrying our marker. Best-effort — a
      # fork PR's read-only token makes the write fail, which must not red CI
      # (warn-but-don't-fail).
      - name: Post size comment (PR)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- fw-size-report -->';
            let body;
            try {
              body = fs.readFileSync('fw/size-comment.md', 'utf8');
            } catch (e) {
              core.info('No size comment to post (no baseline/head?).');
              return;
            }
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(
              github.rest.issues.listComments, { owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment(
                { owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment(
                { owner, repo, issue_number, body });
            }

      - uses: actions/upload-artifact@v4
        with:
          name: dfu_application_proto0.zip
          path: ${{ github.workspace }}/fw/build/dfu_application.zip

      - uses: actions/upload-artifact@v4
        with:
          name: llext-edk.tar.xz
          path: ${{ github.workspace }}/fw/build/fw/zephyr/llext-edk.tar.xz

      # Prebuilt in-repo animation extensions (issue #163). Glob only *.llext —
      # fw/build/extensions/ also holds the extracted EDK tree.
      - uses: actions/upload-artifact@v4
        with:
          name: extensions-proto0
          path: ${{ github.workspace }}/fw/build/extensions/*.llext

  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
    steps:
      - name: Check HDD space
        run: df -h

      - name: Checkout (GitHub)
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Twister tests
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          cacheFrom: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          configFile: .devcontainer/ci/devcontainer.json
          push: filter
          runCmd: twister -T /workspaces/rgb-sunglasses/fw/tests -p native_sim --coverage --coverage-tool lcov --outdir /workspaces/rgb-sunglasses/fw/twister-out-ci

      - name: Fix permissions on test output
        if: always()
        run: |
          # Remove symlinks created by the Zephyr build system that point to
          # paths only accessible inside the container (e.g. syscalls_links).
          # upload-artifact follows symlinks and hits EACCES on those targets.
          sudo find "${{ github.workspace }}/fw/twister-out-ci" -type l -delete 2>/dev/null || true
          # Fix ownership so the upload-artifact action can read all remaining files.
          sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}/fw/twister-out-ci" || true

      - uses: actions/upload-artifact@v4
        with:
          name: twister-out-ci
          path: ${{ github.workspace }}/fw/twister-out-ci

      # Twister writes the lcov report to twister-out-ci/coverage.info (NOT
      # coverage/coverage.info — the old path here only "worked" because the
      # codecov CLI silently fell back to searching). Copy it out and delete
      # the ~200 MB twister-out tree first: the codecov CLI walks the whole
      # workspace regardless of --disable-search, which cost ~1m45s per run.
      - name: Extract coverage report
        run: |
          cp "${{ github.workspace }}/fw/twister-out-ci/coverage.info" "${{ github.workspace }}/fw/coverage-zephyr.info"
          sudo rm -rf "${{ github.workspace }}/fw/twister-out-ci"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ${{ github.workspace }}/fw/coverage-zephyr.info
          disable_search: true
          flags: zephyr
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fw
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Pillow numpy pytest pytest-cov

      - name: Run Python tests
        run: |
          pytest tools/tests/ scripts/tests/ -v \
            --cov=tools/convert_bad_apple \
            --cov=tools/convert_gif_to_glim \
            --cov=scripts/fw_size_report \
            --cov-report=xml:coverage-python.xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: fw/coverage-python.xml
          flags: python
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}