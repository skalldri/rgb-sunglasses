name: 'release'
on:
  push:
    tags:
      # Firmware releases use an fw-v* prefix so they don't collide with the
      # app's app-v* release tags in this monorepo.
      - 'fw-v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Free up space
        run: sudo rm -rf /usr/share/dotnet && sudo rm -rf /usr/local/lib/android && sudo rm -rf /opt/ghc && sudo rm -rf /opt/hostedtoolcache/CodeQL

      - name: Check HDD space
        run: df -h

      - name: Checkout (GitHub)
        uses: actions/checkout@v3

      - name: Parse version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          # Remove 'fw-v' prefix (e.g. fw-v1.2.3 -> 1.2.3)
          VERSION="${TAG#fw-v}"
          # Split into MAJOR.MINOR.PATCH
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

      - name: Generate VERSION file
        run: |
          cat > /tmp/VERSION << EOF
          VERSION_MAJOR = ${{ steps.version.outputs.major }}
          VERSION_MINOR = ${{ steps.version.outputs.minor }}
          PATCHLEVEL = ${{ steps.version.outputs.patch }}
          VERSION_TWEAK = 0
          EXTRAVERSION = stable
          EOF
          cat /tmp/VERSION > ${{ github.workspace }}/fw/VERSION

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Proto0 firmware
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          cacheFrom: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          push: never
          runCmd: west build --build-dir /workspaces/rgb-sunglasses/fw/build /workspaces/rgb-sunglasses/fw --pristine --board rgb_sunglasses_proto0/nrf5340/cpuapp --sysbuild -- -DBOARD_ROOT="/workspaces/rgb-sunglasses/fw" -DVERSION_TWEAK_MODE=release && /workspaces/rgb-sunglasses/fw/extensions/build.sh /workspaces/rgb-sunglasses/fw/build

      - name: Copy Proto0 DFU artifact
        run: cp ${{ github.workspace }}/fw/build/dfu_application.zip ${{ github.workspace }}/dfu_application_proto0.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          # Asset names are an API consumed by the in-app updater
          # (app/services/github-releases.ts findAssetForBoard: first asset whose
          # name contains the board revision AND ends with .zip). Bare *.llext
          # names are safe; never bundle extensions as a zip with "proto0"/"dk"
          # in its name or it can shadow the dfu_application zips (the app still
          # matches "dk" against older releases; DK builds now live only on the
          # dk-support branch, and DK releases must never reuse the fw-v* tag
          # prefix — the app serves the latest fw-v* release to proto0 users).
          files: |
            ${{ github.workspace }}/dfu_application_proto0.zip
            ${{ github.workspace }}/fw/build/extensions/*.llext
          body: "Release ${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
