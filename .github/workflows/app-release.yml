name: App Release

# Triggered by app-prefixed tags (e.g. app-v1.2.3). The firmware release
# workflow already owns the v* tag namespace, so the app uses an app-v* prefix
# to avoid both release workflows firing on the same tag.
#
# A tag push produces ALL release artifacts in parallel:
#   - release:        signed Android APK attached to a GitHub Release
#   - ios-testflight: signed iOS build uploaded to TestFlight
#   - play:           signed Android AAB uploaded to Google Play (gated on the
#                     PLAY_PUBLISH_ENABLED repo variable — inert until the
#                     one-time Play Console bootstrap is done, see
#                     app/docs/play-publishing.md)
# The jobs are independent (each needs only `test` + `version`) so a failure
# on one channel never blocks the others. The shared `version` job is the
# single source of truth for the release version and the derived build
# number — the same value serves as the Android versionCode (GitHub APK and
# Play AAB) and the iOS buildNumber, so the channels can never disagree for a
# given tag. Both Android jobs build through the shared composite action
# .github/actions/build-signed-android so the APK and the AAB cannot silently
# drift apart in how they are built.
#
# `workflow_dispatch` exists for manual single-channel builds without cutting
# a release — `target` picks the channel:
#   - testflight: iOS-only build (first TestFlight upload, pipeline validation)
#   - play:       Google Play dry-run, always uploaded as a DRAFT so a test
#                 can never replace a live Play release
# Both stores permanently consume build numbers (TestFlight: each
# (version, buildNumber) pair; Play: every versionCode, drafts included), so
# manual builds MUST use the 1-9999 build_number range — the `version` job
# enforces the partition against tag-derived numbers (always >= 10000).
#
# SECURITY — the ios-testflight job runs on the self-hosted Mac runner. Same
# argument as app-ios-ci.yml: this workflow triggers only on tag `push` and
# `workflow_dispatch`, both of which require write access to this repo and
# always run THIS repo's trusted copy of the workflow, so fork code can never
# reach the runner.
on:
  push:
    tags:
      - "app-v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      target:
        description: "Which channel to build (manual builds are single-channel so one store's dry-run never burns the other store's build numbers)"
        type: choice
        options:
          - testflight
          - play
        default: testflight
        required: true
      version:
        description: "Version (X.Y.Z) for the manual build (for play dry-runs use 0.9x.y by convention)"
        required: true
      build_number:
        description: "Build number, 1-9999 (enforced; tag builds derive >=10000, and both stores permanently consume each build number)"
        required: true

defaults:
  run:
    working-directory: app

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci

  # Single source of truth for the version string and the derived build
  # number (Android versionCode == iOS buildNumber). Runs on ubuntu so bad
  # inputs fail fast without ever occupying the shared Mac runner.
  #
  # Build-number partition: tag builds use MAJOR*10000 + MINOR*100 + PATCH
  # (monotonic, derivable from the tag, always >= 10000 because MAJOR >= 1 is
  # enforced below); manual dispatch builds are restricted to 1-9999 so the
  # two ranges can never collide. TestFlight permanently consumes each
  # (version, buildNumber) pair — even for deleted builds — so a collision
  # would make the later upload fail forever. Both sides of the partition are
  # enforced here, not just documented.
  version:
    name: Resolve version and build number
    runs-on: ubuntu-latest
    # No checkout — this job only parses strings, so run from the workspace
    # root instead of the (nonexistent without checkout) app/ directory.
    defaults:
      run:
        working-directory: .
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      build_number: ${{ steps.resolve.outputs.build_number }}
    steps:
      - name: Resolve from tag or dispatch inputs
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
            BUILD_NUMBER="$INPUT_BUILD_NUMBER"
            echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' \
              || { echo "::error::version must be X.Y.Z, got '$VERSION'"; exit 1; }
            # 1-9999, no leading zeros: keeps manual builds out of the
            # tag-derived range (>= 10000) and rejects values Apple refuses
            # (0, leading-zero strings).
            echo "$BUILD_NUMBER" | grep -Eq '^[1-9][0-9]{0,3}$' \
              || { echo "::error::build_number must be 1-9999 (no leading zeros) for manual builds, got '$BUILD_NUMBER'"; exit 1; }
          else
            # Strip the app-v prefix (e.g. app-v1.2.3 -> 1.2.3)
            VERSION="${GITHUB_REF_NAME#app-v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            # The partition above assumes MAJOR >= 1; a 0.x.y tag would land
            # in the manual range and could collide with a prior manual build.
            [ "$MAJOR" -ge 1 ] \
              || { echo "::error::app-v0.x.y tags are not supported (tag-derived build numbers must be >= 10000)"; exit 1; }
            # The formula is only monotonic while MINOR and PATCH stay below
            # 100 (1.0.100 would collide with 1.1.0). Both stores permanently
            # consume build numbers, so a collision is unrecoverable — and a
            # GitHub APK shipped with a colliding versionCode would block
            # Play from ever offering the colliding successor as an update.
            if [ "$MINOR" -ge 100 ] || [ "$PATCH" -ge 100 ]; then
              echo "::error::minor/patch must be < 100 for the build-number scheme (got $VERSION)"
              exit 1
            fi
            BUILD_NUMBER=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

  release:
    name: Build and Publish Android APK
    needs: [test, version]
    # Manual dispatches are for iOS-only TestFlight builds — don't create a
    # GitHub Release for them.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build signed release APK
        uses: ./.github/actions/build-signed-android
        with:
          version: ${{ needs.version.outputs.version }}
          version-code: ${{ needs.version.outputs.build_number }}
          gradle-task: assembleRelease
          keystore-base64: ${{ secrets.KEYSTORE_BASE64 }}
          store-password: ${{ secrets.STORE_PASSWORD }}
          key-alias: ${{ secrets.KEY_ALIAS }}
          key-password: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/rgb-sunglasses-${{ needs.version.outputs.version }}.apk

      - name: Generate APK download QR code
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qrencode
          sudo rm -rf /var/lib/apt/lists/*
          # The asset isn't uploaded yet, but a release asset's download URL is
          # deterministic from the repo + tag + filename, so we can encode it now.
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rgb-sunglasses-${{ needs.version.outputs.version }}.apk"
          qrencode -s 8 -m 2 \
            -o android/app/build/outputs/apk/release/rgb-sunglasses-${{ needs.version.outputs.version }}-qr.png \
            "$APK_URL"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/android/app/build/outputs/apk/release/rgb-sunglasses-*.apk
            app/android/app/build/outputs/apk/release/rgb-sunglasses-*-qr.png
          generate_release_notes: true
          append_body: true
          body: |
            ## 📱 Install on Android

            Scan to download the APK:

            ![Download QR code](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rgb-sunglasses-${{ needs.version.outputs.version }}-qr.png)

            [Direct download: rgb-sunglasses-${{ needs.version.outputs.version }}.apk](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rgb-sunglasses-${{ needs.version.outputs.version }}.apk)

  ios-testflight:
    name: Build and Upload to TestFlight
    needs: [test, version]
    # Gated on a repo variable (set TESTFLIGHT_PUBLISH_ENABLED=true to
    # publish; anything else skips the job) so iOS publishing can be paused
    # without editing the workflow — same pattern as the play job's
    # PLAY_PUBLISH_ENABLED. Manual dispatches additionally build a single
    # channel: only occupy the shared Mac runner (and consume a TestFlight
    # (version, buildNumber) pair) when the dispatch actually targets
    # TestFlight.
    if: |
      vars.TESTFLIGHT_PUBLISH_ENABLED == 'true' &&
      (github.event_name == 'push' || inputs.target == 'testflight')
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: read
    env:
      # Team ID is not sensitive (it's embedded in every distributed app), so
      # it lives in a repo *variable* rather than a secret.
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      # Fail fast with an actionable message if the Apple credentials aren't
      # configured yet (they're a one-time manual setup — see app/CLAUDE.md).
      - name: Check Apple credentials are configured
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_DIST_CERT_P12: ${{ secrets.APPLE_DIST_CERT_P12 }}
          APPLE_DIST_CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
          APPLE_DEV_CERT_P12: ${{ secrets.APPLE_DEV_CERT_P12 }}
          APPLE_DEV_CERT_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
        run: |
          MISSING=""
          [ -z "$ASC_API_KEY_P8" ] && MISSING="$MISSING ASC_API_KEY_P8(secret)"
          [ -z "$ASC_KEY_ID" ] && MISSING="$MISSING ASC_KEY_ID(secret)"
          [ -z "$ASC_ISSUER_ID" ] && MISSING="$MISSING ASC_ISSUER_ID(secret)"
          [ -z "$APPLE_TEAM_ID" ] && MISSING="$MISSING APPLE_TEAM_ID(variable)"
          [ -z "$APPLE_DIST_CERT_P12" ] && MISSING="$MISSING APPLE_DIST_CERT_P12(secret)"
          [ -z "$APPLE_DIST_CERT_PASSWORD" ] && MISSING="$MISSING APPLE_DIST_CERT_PASSWORD(secret)"
          [ -z "$APPLE_DEV_CERT_P12" ] && MISSING="$MISSING APPLE_DEV_CERT_P12(secret)"
          [ -z "$APPLE_DEV_CERT_PASSWORD" ] && MISSING="$MISSING APPLE_DEV_CERT_PASSWORD(secret)"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing Apple credentials:$MISSING — set secrets with 'gh secret set <name>' and the variable with 'gh variable set APPLE_TEAM_ID'."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set version in app.json
        run: |
          # ios.buildNumber is a string in the Expo schema (unlike the numeric
          # android.versionCode), hence --arg for both.
          jq --arg v "${{ needs.version.outputs.version }}" \
             --arg bn "${{ needs.version.outputs.build_number }}" \
             '.expo.version = $v | .expo.ios.buildNumber = $bn' \
             app.json > app.json.tmp && mv app.json.tmp app.json

      # Regenerates ios/ from app.json + config plugins and runs `pod install`.
      - name: Generate iOS native project
        run: npx expo prebuild --platform ios --clean

      # Automatic signing + -allowProvisioningUpdates, authenticated by an App
      # Store Connect API key: Xcode creates/downloads the App Store
      # provisioning profile. The ASC key manages *profiles* only — the actual
      # Apple Distribution *signing certificate + key* is provided by the
      # dedicated keychain set up below (the ASC key cannot sign on its own).
      # Secrets are written only under $RUNNER_TEMP and removed in the
      # always() cleanup step (the runner is self-hosted and persistent).
      - name: Write App Store Connect API key and export options
        run: |
          echo "${{ secrets.ASC_API_KEY_P8 }}" | base64 --decode > "$RUNNER_TEMP/asc_api_key.p8"
          cat > "$RUNNER_TEMP/exportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <!-- Defaults to YES, which would let Xcode rewrite the build
                 number we injected into app.json. -->
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      # Self-contained signing keychain: import the signing certs into a
      # throwaway keychain we create, unlock, and grant codesign
      # non-interactive access to — all inside this job's own session. This
      # replaces relying on the runner's login keychain being unlocked in an
      # interactive GUI session, which broke after reboots / in headless
      # (LaunchDaemon) runner sessions with `errSecInternalComponent`.
      # Two cert secrets are imported: APPLE_DEV_CERT_P12 (Apple Development)
      # and APPLE_DIST_CERT_P12 (Apple Distribution), each cert + private key.
      # Automatic signing archives with Development, then -exportArchive
      # re-signs for app-store with Distribution — each needs an accessible key
      # here. (Two separate .p12s because Keychain Access / Xcode won't export
      # both identities into one file.) Deleted in the always() cleanup step.
      - name: Set up signing keychain
        env:
          APPLE_DIST_CERT_P12: ${{ secrets.APPLE_DIST_CERT_P12 }}
          APPLE_DIST_CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
          APPLE_DEV_CERT_P12: ${{ secrets.APPLE_DEV_CERT_P12 }}
          APPLE_DEV_CERT_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          echo "$APPLE_DIST_CERT_P12" | base64 --decode > "$RUNNER_TEMP/dist_cert.p12"
          echo "$APPLE_DEV_CERT_P12" | base64 --decode > "$RUNNER_TEMP/dev_cert.p12"

          # Fresh keychain; no auto-lock for the build's duration.
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"

          # Import both signing identities (Distribution for the app-store
          # re-sign, Development for the archive) and let codesign use the keys
          # without a UI prompt (fixes errSecInternalComponent).
          security import "$RUNNER_TEMP/dist_cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_DIST_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security import "$RUNNER_TEMP/dev_cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_DEV_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null

          # Prepend our keychain to the user search list (keep the existing
          # entries so the Apple WWDR intermediate remains discoverable).
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed 's/[",]//g')

          echo "Signing identities available to the build:"
          security find-identity -v -p codesigning "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/dist_cert.p12" "$RUNNER_TEMP/dev_cert.p12"

      # -derivedDataPath keeps intermediates out of the default
      # ~/Library/Developer/Xcode/DerivedData, which nothing would ever clean
      # on this persistent runner — the cleanup step removes this one.
      - name: Archive (Release, cloud signing)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/RGBSunglasses.xcworkspace \
            -scheme RGBSunglasses \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/RGBSunglasses.xcarchive" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc_api_key.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            archive
        # Automatic signing archives with the Development identity (its
        # default) and -exportArchive later re-signs for app-store with the
        # Distribution identity — so BOTH certs' private keys must be in the
        # signing keychain set up above (see that step). Do NOT force
        # CODE_SIGN_IDENTITY here: overriding it while automatic signing is
        # active fails with "conflicting provisioning settings".

      # Export the .ipa to disk first (destination=export) so we always have a
      # debuggable artifact, and so a broken archive fails here rather than
      # mid-upload. -exportPath is relative to the app/ working directory, so
      # the .ipa lands where upload-artifact expects it.
      - name: Export .ipa
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/RGBSunglasses.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist" \
            -exportPath ios-export \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc_api_key.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: rgb-sunglasses-ios-${{ needs.version.outputs.version }}-${{ needs.version.outputs.build_number }}
          path: app/ios-export/*.ipa
          retention-days: 14

      # A second exportArchive of the same archive with destination=upload
      # sends the build straight to App Store Connect / TestFlight. This is
      # the supported first-party CLI upload path (altool is deprecated). The
      # re-export costs ~1-2 min on top of the archive; the tradeoff buys the
      # retained .ipa artifact above and export failures surfacing before any
      # upload starts.
      - name: Upload to TestFlight
        run: |
          plutil -replace destination -string upload "$RUNNER_TEMP/exportOptions.plist"
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/RGBSunglasses.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc_api_key.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      # The runner is self-hosted and persistent: remove key material and
      # build products regardless of job outcome.
      - name: Cleanup
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/asc_api_key.p8" "$RUNNER_TEMP/exportOptions.plist"
          rm -rf "$RUNNER_TEMP/RGBSunglasses.xcarchive" "$RUNNER_TEMP/DerivedData"
          rm -rf ios-export
          # Remove the throwaway signing keychain and restore the search list.
          rm -f "$RUNNER_TEMP/dist_cert.p12" "$RUNNER_TEMP/dev_cert.p12"
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
          security list-keychains -d user -s login.keychain-db 2>/dev/null || true

  # Publishes an AAB to Google Play. The Play build is a distinct variant of
  # the Android app (self-update flow disabled, no REQUEST_INSTALL_PACKAGES —
  # Play policy forbids self-updating outside Play), so it needs its own
  # build. Deliberately a separate job for failure isolation: a Play API
  # error never blocks the GitHub release or TestFlight, and vice versa.
  #
  # Gated on repo variables so the workflow is inert until the one-time Play
  # Console bootstrap is done — see app/docs/play-publishing.md.
  play:
    name: Publish to Google Play
    needs: [test, version]
    if: |
      vars.PLAY_PUBLISH_ENABLED == 'true' &&
      (github.event_name == 'push' || inputs.target == 'play')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build signed release AAB (Play variant)
        uses: ./.github/actions/build-signed-android
        with:
          version: ${{ needs.version.outputs.version }}
          version-code: ${{ needs.version.outputs.build_number }}
          gradle-task: bundleRelease
          play-variant: "true"
          keystore-base64: ${{ secrets.KEYSTORE_BASE64 }}
          store-password: ${{ secrets.STORE_PASSWORD }}
          key-alias: ${{ secrets.KEY_ALIAS }}
          key-password: ${{ secrets.KEY_PASSWORD }}

      - name: Write Play release notes (what's new)
        run: |
          mkdir -p whatsnew
          NOTES=""
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            # actions/checkout can flatten annotated tags to lightweight ones —
            # re-fetch the real tag object so its message is available.
            git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}" || true
            # Only an annotated tag (a "tag" object) carries a release
            # message. %(contents) on a lightweight tag prints the pointed-to
            # COMMIT's message — never publish that (commit messages carry
            # trailers not meant for the Play listing).
            if [ "$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}" 2>/dev/null)" = "tag" ]; then
              NOTES=$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")
            fi
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Bug fixes and improvements. Full notes: https://github.com/${{ github.repository }}/releases"
          fi
          # Play hard limit: 500 CHARACTERS. Truncate by codepoint — a byte
          # truncation (head -c) can split a multi-byte UTF-8 sequence and
          # make the Play API reject the file as invalid UTF-8.
          printf '%s' "$NOTES" \
            | python3 -c 'import sys; sys.stdout.buffer.write(sys.stdin.buffer.read().decode("utf-8", "replace")[:500].encode("utf-8"))' \
            > whatsnew/whatsnew-en-US

      - name: Upload to Google Play
        # r0adkll/upload-google-play v1.1.5, pinned by SHA (handles a
        # signing-adjacent secret). Input paths are workspace-root-relative —
        # the job's working-directory default does not apply to `uses:` steps.
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.autom8ed.rgbsunglassesapp
          releaseFiles: app/android/app/build/outputs/bundle/release/app-release.aab
          releaseName: ${{ needs.version.outputs.version }}
          track: ${{ vars.PLAY_TRACK || 'internal' }}
          # Fail-safe default is DRAFT: a never-published app rejects
          # 'completed' releases outright, and dry-runs must never replace the
          # live release. Going live automatically requires explicitly setting
          # the PLAY_RELEASE_STATUS repo variable to 'completed'.
          status: ${{ github.event_name == 'workflow_dispatch' && 'draft' || vars.PLAY_RELEASE_STATUS || 'draft' }}
          whatsNewDirectory: app/whatsnew
