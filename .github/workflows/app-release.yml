name: App Release (Android)

# Triggered by app-prefixed tags (e.g. app-v1.2.3). The firmware release
# workflow already owns the v* tag namespace, so the app uses an app-v* prefix
# to avoid both release workflows firing on the same tag.
on:
  push:
    tags:
      - "app-v[0-9]+.[0-9]+.[0-9]+"

defaults:
  run:
    working-directory: app

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci

  release:
    name: Build and Publish Android APK
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip the app-v prefix (e.g. app-v1.2.3 -> 1.2.3)
          VERSION="${TAG#app-v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Set version in app.json
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
             --argjson vc ${{ steps.version.outputs.version_code }} \
             '.expo.version = $v | .expo.android.versionCode = $vc' \
             app.json > app.json.tmp && mv app.json.tmp app.json

      - name: Generate Android native project
        run: npx expo prebuild --platform android --clean

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build release APK
        run: |
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Remove keystore
        if: always()
        run: rm -f android/app/release.keystore

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/rgb-sunglasses-${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/android/app/build/outputs/apk/release/rgb-sunglasses-*.apk
          generate_release_notes: true
