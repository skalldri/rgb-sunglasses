name: App Release

# Triggered by app-prefixed tags (e.g. app-v1.2.3). The firmware release
# workflow already owns the v* tag namespace, so the app uses an app-v* prefix
# to avoid both release workflows firing on the same tag.
#
# A tag push produces BOTH release artifacts in parallel:
#   - release:        signed Android APK attached to a GitHub Release
#   - ios-testflight: signed iOS build uploaded to TestFlight
# The two jobs are independent (both need only `test`) so a failure on one
# platform never blocks the other.
#
# `workflow_dispatch` exists for iOS-only manual builds (first TestFlight
# upload, pipeline validation) without cutting a release — it skips the
# Android job entirely.
#
# SECURITY — the ios-testflight job runs on the self-hosted Mac runner. Same
# argument as app-ios-ci.yml: this workflow triggers only on tag `push` and
# `workflow_dispatch`, both of which require write access to this repo and
# always run THIS repo's trusted copy of the workflow, so fork code can never
# reach the runner.
on:
  push:
    tags:
      - "app-v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (X.Y.Z) for a manual TestFlight-only build"
        required: true
      build_number:
        description: "iOS build number — use 1-9999 for manual builds; tag builds derive >=10000 and each (version, build number) pair can only ever be uploaded to TestFlight once"
        required: true

defaults:
  run:
    working-directory: app

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci

  release:
    name: Build and Publish Android APK
    needs: test
    # Manual dispatches are for iOS-only TestFlight builds — don't create a
    # GitHub Release for them.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip the app-v prefix (e.g. app-v1.2.3 -> 1.2.3)
          VERSION="${TAG#app-v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Set version in app.json
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
             --argjson vc ${{ steps.version.outputs.version_code }} \
             '.expo.version = $v | .expo.android.versionCode = $vc' \
             app.json > app.json.tmp && mv app.json.tmp app.json

      - name: Generate Android native project
        run: npx expo prebuild --platform android --clean

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build release APK
        run: |
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Remove keystore
        if: always()
        run: rm -f android/app/release.keystore

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/rgb-sunglasses-${{ steps.version.outputs.version }}.apk

      - name: Generate APK download QR code
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qrencode
          sudo rm -rf /var/lib/apt/lists/*
          # The asset isn't uploaded yet, but a release asset's download URL is
          # deterministic from the repo + tag + filename, so we can encode it now.
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rgb-sunglasses-${{ steps.version.outputs.version }}.apk"
          qrencode -s 8 -m 2 \
            -o android/app/build/outputs/apk/release/rgb-sunglasses-${{ steps.version.outputs.version }}-qr.png \
            "$APK_URL"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/android/app/build/outputs/apk/release/rgb-sunglasses-*.apk
            app/android/app/build/outputs/apk/release/rgb-sunglasses-*-qr.png
          generate_release_notes: true
          append_body: true
          body: |
            ## 📱 Install on Android

            Scan to download the APK:

            ![Download QR code](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rgb-sunglasses-${{ steps.version.outputs.version }}-qr.png)

            [Direct download: rgb-sunglasses-${{ steps.version.outputs.version }}.apk](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rgb-sunglasses-${{ steps.version.outputs.version }}.apk)

  ios-testflight:
    name: Build and Upload to TestFlight
    needs: test
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: read
    env:
      # Team ID is not sensitive (it's embedded in every distributed app), so
      # it lives in a repo *variable* rather than a secret.
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      # Fail fast with an actionable message if the Apple credentials aren't
      # configured yet (they're a one-time manual setup — see app/CLAUDE.md).
      - name: Check Apple credentials are configured
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          MISSING=""
          [ -z "$ASC_API_KEY_P8" ] && MISSING="$MISSING ASC_API_KEY_P8(secret)"
          [ -z "$ASC_KEY_ID" ] && MISSING="$MISSING ASC_KEY_ID(secret)"
          [ -z "$ASC_ISSUER_ID" ] && MISSING="$MISSING ASC_ISSUER_ID(secret)"
          [ -z "$APPLE_TEAM_ID" ] && MISSING="$MISSING APPLE_TEAM_ID(variable)"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing Apple credentials:$MISSING — set secrets with 'gh secret set <name>' and the variable with 'gh variable set APPLE_TEAM_ID'."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve version and build number
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
            BUILD_NUMBER="$INPUT_BUILD_NUMBER"
            echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' \
              || { echo "::error::version must be X.Y.Z, got '$VERSION'"; exit 1; }
            echo "$BUILD_NUMBER" | grep -Eq '^[0-9]+$' \
              || { echo "::error::build_number must be an integer, got '$BUILD_NUMBER'"; exit 1; }
          else
            VERSION="${GITHUB_REF_NAME#app-v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            # Same formula as the Android versionCode: monotonic and derivable
            # from the tag. TestFlight permanently consumes each
            # (version, buildNumber) pair, so re-pushing a tag whose upload
            # already succeeded will fail — bump the patch version instead.
            BUILD_NUMBER=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Set version in app.json
        run: |
          # ios.buildNumber is a string in the Expo schema (unlike the numeric
          # android.versionCode), hence --arg for both.
          jq --arg v "${{ steps.version.outputs.version }}" \
             --arg bn "${{ steps.version.outputs.build_number }}" \
             '.expo.version = $v | .expo.ios.buildNumber = $bn' \
             app.json > app.json.tmp && mv app.json.tmp app.json

      # Regenerates ios/ from app.json + config plugins and runs `pod install`.
      - name: Generate iOS native project
        run: npx expo prebuild --platform ios --clean

      # Cloud signing: automatic signing + -allowProvisioningUpdates
      # authenticated by an App Store Connect API key. Xcode creates/downloads
      # the App Store provisioning profile and uses a cloud-managed Apple
      # Distribution certificate — no .p12 or keychain setup on the runner.
      # Secrets are written only under $RUNNER_TEMP and removed in the
      # always() cleanup step (the runner is self-hosted and persistent).
      - name: Write App Store Connect API key and export options
        run: |
          echo "${{ secrets.ASC_API_KEY_P8 }}" | base64 --decode > "$RUNNER_TEMP/asc_api_key.p8"
          cat > "$RUNNER_TEMP/exportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <!-- Defaults to YES, which would let Xcode rewrite the build
                 number we injected into app.json. -->
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Archive (Release, cloud signing)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/RGBSunglasses.xcworkspace \
            -scheme RGBSunglasses \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/RGBSunglasses.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc_api_key.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            archive

      # Export the .ipa to disk first (destination=export) so we always have a
      # debuggable artifact, and so a broken archive fails here rather than
      # mid-upload.
      - name: Export .ipa
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/RGBSunglasses.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc_api_key.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"
          # Stage the .ipa inside the workspace so upload-artifact (which
          # resolves paths repo-relative) can pick it up.
          mkdir -p ios-export
          cp "$RUNNER_TEMP"/export/*.ipa ios-export/

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: rgb-sunglasses-ios-${{ steps.version.outputs.version }}-${{ steps.version.outputs.build_number }}
          path: app/ios-export/*.ipa
          retention-days: 14

      # A second exportArchive of the same archive with destination=upload
      # sends the build straight to App Store Connect / TestFlight. This is
      # the supported first-party CLI upload path (altool is deprecated).
      - name: Upload to TestFlight
        run: |
          plutil -replace destination -string upload "$RUNNER_TEMP/exportOptions.plist"
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/RGBSunglasses.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc_api_key.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      # The runner is self-hosted and persistent: remove key material and
      # build products regardless of job outcome.
      - name: Cleanup
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/asc_api_key.p8" "$RUNNER_TEMP/exportOptions.plist"
          rm -rf "$RUNNER_TEMP/RGBSunglasses.xcarchive" "$RUNNER_TEMP/export"
          rm -rf ios-export ios/build
