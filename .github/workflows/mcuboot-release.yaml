name: 'mcuboot-release'
on:
  push:
    tags:
      # MCUboot releases use mcuboot-v* tags, independent of fw-v* and app-v* tracks.
      - 'mcuboot-v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Free up space
        run: sudo rm -rf /usr/share/dotnet && sudo rm -rf /usr/local/lib/android && sudo rm -rf /opt/ghc && sudo rm -rf /opt/hostedtoolcache/CodeQL

      - name: Check HDD space
        run: df -h

      - name: Checkout (GitHub)
        uses: actions/checkout@v3

      - name: Parse version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          # Remove 'mcuboot-v' prefix (e.g. mcuboot-v1.2.3 -> 1.2.3)
          VERSION="${TAG#mcuboot-v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

      - name: Stamp MCUboot VERSION file from tag
        run: |
          cat > ${{ github.workspace }}/fw/sysbuild/mcuboot/VERSION << EOF
          VERSION_MAJOR = ${{ steps.version.outputs.major }}
          VERSION_MINOR = ${{ steps.version.outputs.minor }}
          PATCHLEVEL = ${{ steps.version.outputs.patch }}
          VERSION_TWEAK = 0
          EXTRAVERSION = stable
          EOF

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Proto0 firmware (includes MCUboot)
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          cacheFrom: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          push: never
          runCmd: west build --build-dir /workspaces/rgb-sunglasses/fw/build /workspaces/rgb-sunglasses/fw --pristine --board rgb_sunglasses_proto0/nrf5340/cpuapp --sysbuild -- -DBOARD_ROOT="/workspaces/rgb-sunglasses/fw"

      - name: Package MCUboot binary
        run: |
          python3 ${{ github.workspace }}/fw/tools/package_mcuboot.py \
            --input  ${{ github.workspace }}/fw/build/mcuboot/zephyr/zephyr.bin \
            --output ${{ github.workspace }}/mcuboot-${{ steps.version.outputs.version }}-proto0.bin \
            --major  ${{ steps.version.outputs.major }} \
            --minor  ${{ steps.version.outputs.minor }} \
            --revision ${{ steps.version.outputs.patch }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ github.workspace }}/mcuboot-${{ steps.version.outputs.version }}-proto0.bin
          body: "MCUboot Bootloader ${{ steps.version.outputs.version }} (Proto0)"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
