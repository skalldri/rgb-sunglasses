name: App CI

# React Native / Expo control app under app/. GitHub only runs workflows from
# the repo-root .github/workflows, so this lives here (not under app/.github).
# Path-filtered so it only runs when the app changes, mirroring the firmware
# workflows' fw/** scoping.
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'

# All run: steps execute inside app/. Note: this does NOT affect `uses:` actions
# (setup-node cache, upload-artifact) or ${{ github.workspace }} paths, which are
# always relative to the repo root and therefore need an explicit app/ prefix.
#
# CI runs the test suite and a debug Android build to verify the native project
# still compiles. It deliberately does NOT release-sign: the debug build uses
# Android's auto-generated debug keystore, so no signing secrets are required.
# The signed release APK is produced only in app-release.yml, gated on an
# app-v* tag.
defaults:
  run:
    working-directory: app

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci

  build-android:
    name: Build Android (debug)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Generate Android native project
        run: npx expo prebuild --platform android --clean

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # assembleDebug compiles the full native project (RN + native modules) and
      # is signed with the auto-generated debug keystore, so it needs no secrets.
      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: rgb-sunglasses-debug-${{ github.sha }}
          path: app/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # iOS builds require macOS/Xcode and so cannot run on the ubuntu runners used
  # above. This job runs on a self-hosted Apple Silicon (Mac Mini M1) runner —
  # see app/README.md "iOS (macOS)" for runner registration. Like build-android,
  # it builds an UNSIGNED debug binary (for the iOS Simulator), so it needs no
  # Apple Developer account, certificates, or signing secrets. The simulator has
  # no Bluetooth radio, so this verifies build + launch only, not live BLE.
  #
  # SECURITY: this is the only self-hosted job, so it is the only one that runs
  # untrusted contributor code on our own hardware. This repo is public, so the
  # `if` below restricts when it runs (the hosted Linux jobs above stay open and
  # still give every PR test + Android coverage):
  #   - push events (post-merge code on our branches) always run.
  #   - pull_request events run ONLY when the PR head is a branch in THIS repo
  #     (never a fork) AND the author is in the approved-actor allowlist.
  # The allowlist is the repo variable IOS_CI_ALLOWED_ACTORS (a JSON array of
  # logins, editable under Settings -> Secrets and variables -> Actions ->
  # Variables — no workflow edit needed); it falls back to ["skalldri"] if unset.
  build-ios:
    name: Build iOS (simulator, unsigned)
    needs: test
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJSON(vars.IOS_CI_ALLOWED_ACTORS || '["skalldri"]'), github.actor))
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Regenerates ios/ from app.json + config plugins and runs `pod install`.
      - name: Generate iOS native project
        run: npx expo prebuild --platform ios --clean

      # The scheme/workspace names derive from the Expo project name
      # ("RGB Sunglasses" -> "RGBSunglasses"). CODE_SIGNING_ALLOWED=NO keeps the
      # simulator build unsigned, mirroring the Android debug build.
      - name: Build for iOS Simulator (unsigned)
        run: |
          xcodebuild \
            -workspace ios/RGBSunglasses.xcworkspace \
            -scheme RGBSunglasses \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build

      # Smoke test: boot a simulator, install the built .app, launch it, and
      # confirm the process is still alive a few seconds later (catches launch
      # crashes that a pure compile would miss).
      - name: Smoke test in simulator (boot, install, launch)
        run: |
          set -euo pipefail
          BUNDLE_ID=com.autom8ed.rgbsunglassesapp
          APP_PATH=ios/build/Build/Products/Debug-iphonesimulator/RGBSunglasses.app
          DEVICE_ID=$(xcrun simctl list devices available | grep -E "iPhone" | grep -oE "[0-9A-Fa-f-]{36}" | head -1)
          echo "Using simulator: $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"
          xcrun simctl launch "$DEVICE_ID" "$BUNDLE_ID"
          sleep 5
          xcrun simctl spawn "$DEVICE_ID" launchctl list | grep "$BUNDLE_ID" \
            || { echo "::error::App is not running 5s after launch"; exit 1; }
          xcrun simctl io "$DEVICE_ID" screenshot ios-smoke.png || true
          xcrun simctl shutdown "$DEVICE_ID" || true

      - name: Upload iOS simulator build
        uses: actions/upload-artifact@v4
        with:
          name: rgb-sunglasses-ios-sim-${{ github.sha }}
          path: |
            app/ios/build/Build/Products/Debug-iphonesimulator/RGBSunglasses.app
            app/ios-smoke.png
          retention-days: 7
