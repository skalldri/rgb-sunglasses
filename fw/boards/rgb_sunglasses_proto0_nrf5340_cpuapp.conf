# Proto0-specific Kconfig overrides.
# Picked up automatically by west build when targeting rgb_sunglasses_proto0/nrf5340/cpuapp.

# BMI270 6-axis IMU (not present on the legacy DK board)
CONFIG_SENSOR=y
CONFIG_BMI270=y
CONFIG_BMI270_TRIGGER_OWN_THREAD=y
CONFIG_IMU=y
CONFIG_ANIMATION_TILT=y
CONFIG_ANIMATION_PULSE=y

# MX25R6435F QSPI NOR flash (not present on the legacy DK board)
CONFIG_NORDIC_QSPI_NOR=y
# PM_DEVICE required for deep-power-down (has-dpd in DTS)
CONFIG_PM_DEVICE=y

# Flash shell disabled to save ~10KB FLASH (~6KB code + 4KB shell buffer) -- no workflow
# uses the `flash` shell command (issue #79 ROM investigation).
CONFIG_FLASH_SHELL=n

# FAT filesystem on the external QSPI flash, exposed via USB Mass Storage.
# The flash disk driver wires the fat_partition DTS node to the "NAND" disk;
# CONFIG_USBD_MSC_CLASS registers it as a composite USB MSC interface alongside
# the two existing CDC ACM interfaces (console + mcumgr).
# CONFIG_FS_FATFS_MOUNT_MKFS auto-formats the partition on first mount.
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_MOUNT_MKFS=y
CONFIG_DISK_DRIVER_FLASH=y

# Long File Name support is needed for filenames longer than 12 characters
# Default buffer supports filenames up to 255 characters
CONFIG_FS_FATFS_LFN=y

# USBD Next Mass Storage Class. Replaces the old CONFIG_USB_MASS_STORAGE.
# The LUN name ("NAND") and disk binding are configured in src/usb/usb_init.c.
CONFIG_USBD_MSC_CLASS=y

# The MX25R6435F has a 4 KB erase page, so the SCSI buffer and FAT sector size
# must both be at least 4096 bytes to avoid sub-page writes.
CONFIG_USBD_MSC_SCSI_BUFFER_SIZE=4096

# USB Product string shown on the host (Device Manager / lsusb / etc), mirrors
# CONFIG_BT_DEVICE_NAME below (issue #107).
CONFIG_APP_USB_PRODUCT_STRING="RGB Sunglasses Proto0"

# The UDC net_buf pool must be large enough for the MSC SCSI transfer buffer
# (4096 bytes) plus simultaneous CDC ACM and control endpoint transfers.
# The default of 1024 is far too small: MSC allocates a single 4095-byte
# net_buf that can never be satisfied, causing every control transfer to fail
# and the host to reset the device in a loop.
CONFIG_UDC_BUF_POOL_SIZE=8192

# The default FATFS sector size is 512 bytes, but the MX25R6435F has a 4KB page size.
# Sector Size == Page Size for flash-backed FAT FS
CONFIG_FS_FATFS_MAX_SS=4096

CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_FILE_SYSTEM_MKFS=y

# Enable audio subsystem support
CONFIG_AUDIO=y

# Enable the generic PDM / DMIC interface
CONFIG_AUDIO_DMIC=y

# Disabled: costs ~94KB FLASH (confirmed via `ninja rom_report` + `nm`, issue #79 flash
# investigation). bq25792_dump()'s REG_LIST X-macro forces the compiler to instantiate
# .dump() on all 141 RegisterField<> template specializations in bq25792_priv.h; the
# "we have memory to spare" assumption behind the original comment no longer holds. Real
# runtime register access (e.g. temp_override) doesn't depend on this and is unaffected.
CONFIG_DUMP_DEVICE_REGISTERS=n

# Sensor shell disabled to save ~14KB FLASH + a 4KB thread stack (issue #79 ROM
# investigation). It was debug-only; `sensor stream ... on` is also the command that
# once wedged the shell UART (see fw/CLAUDE.md "Recovering a wedged shell UART").
# The IMU itself (CONFIG_SENSOR/CONFIG_BMI270 above) is unaffected.
CONFIG_SENSOR_SHELL=n

# devmem shell command defaults to y whenever SHELL is enabled; never used here
# (J-Link/GDB covers raw memory pokes). Saves ~2KB (issue #79 ROM investigation).
CONFIG_DEVMEM_SHELL=n

CONFIG_DEBUG=y
CONFIG_DEBUG_INFO=y
CONFIG_STACK_USAGE=y
CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_INIT_STACKS=y

# Build -Os instead of -Og (issue #79 ROM investigation). The whole image was previously
# compiled with CONFIG_DEBUG_OPTIMIZATIONS=y (-Og), which cost well over 100KB of FLASH
# vs -Os. GDB stepping is coarser at -Os; temporarily flip back to
# CONFIG_DEBUG_OPTIMIZATIONS=y for deep debugging sessions if needed.
# CONFIG_SIZE_OPTIMIZATIONS_AGGRESSIVE=y
CONFIG_SIZE_OPTIMIZATIONS=y

CONFIG_HW_STACK_PROTECTION=y

CONFIG_STACK_USAGE=y

# Coredump capture to the internal-flash coredump_partition (issue #80; moved here
# from prj.conf — the legacy DK board dropped coredump support for ROM). The NCS "nrf flash
# partition" backend writes via raw nrfx_nvmc, the only flash path safe inside a
# fault handler (IRQs locked — the external QSPI driver needs interrupts/scheduler).
# On the next boot src/debug/coredump_manager.cpp copies the dump to /NAND:/coredump/.
CONFIG_DEBUG_COREDUMP=y
CONFIG_DEBUG_COREDUMP_BACKEND_OTHER=y
CONFIG_DEBUG_COREDUMP_BACKEND_NRF_FLASH_PARTITION=y
CONFIG_DEBUG_COREDUMP_MEMORY_DUMP_THREADS=y
CONFIG_DEBUG_COREDUMP_THREADS_METADATA=y
# Dump-size budget: the 64 KB coredump_partition holds AT MOST one dump, and the NCS
# backend does NOT truncate — an oversized dump is lost entirely (write_error=-ENOMEM,
# header never written). Full thread stacks total ~93 KB here, so cap each thread's
# dumped stack at the 1536 bytes nearest its SP (innermost frames):
#   ~27 threads x 1536 B stack tops        = 41,472
#   full ISR stack (CONFIG_ISR_STACK_SIZE) =  4,096   (not subject to STACK_TOP)
#   ~27 x ~280 B struct k_thread           =  7,560
#   _kernel + metadata + region headers    = ~1,800
#   worst case ~54.9 KB vs 65,520 usable (64 KB - 16 B backend header) -> ~16% headroom.
# LIMIT=2048 would overflow (~68.8 KB). Adding threads erodes this headroom — redo the
# arithmetic before raising the limit or adding many threads.
CONFIG_DEBUG_COREDUMP_THREAD_STACK_TOP=y
CONFIG_DEBUG_COREDUMP_THREAD_STACK_TOP_LIMIT=1536
# `coredump find/verify/print/erase` shell commands — serial fallback for reading a
# dump when USB MSC isn't available (coredump print output feeds Zephyr's
# coredump_serial_log_parser.py).
CONFIG_DEBUG_COREDUMP_SHELL=y
# Drain captured dumps to /NAND:/coredump/ and nag until they're collected.
CONFIG_APP_COREDUMP_MANAGER=y
# `crash panic` / `crash mpu` test commands for end-to-end coredump validation.
CONFIG_APP_CRASH_TEST_COMMANDS=y

CONFIG_FPU=y
CONFIG_FPU_SHARING=y

CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_TRANSFORM=y
CONFIG_CMSIS_DSP_COMPLEXMATH=y
CONFIG_CMSIS_DSP_STATISTICS=y
CONFIG_CMSIS_DSP_WINDOW=y

CONFIG_LLEXT=y
# The llext filesystem loader is LLEXT_STORAGE_TEMPORARY: the whole ELF plus all
# allocated regions are copied into this heap at load time, with each region rounded
# up to a power-of-two for the ARM MPU. Load-on-activate (issue #85) keeps at most
# ONE extension resident, so the heap only needs the largest single extension plus
# the transient whole-ELF copy that coexists with its region allocs during load
# (~13-15KB peak for plasma's 4.4KB ELF) — 24KB gives ~2x headroom. This buffer is
# .noinit but IS counted in the linker's RAM usage figure.
CONFIG_LLEXT_HEAP_SIZE=24
# The generic `llext` shell (list/load_hex/unload) is a debug-only hex-loader whose
# CONFIG_LLEXT_SHELL_MAX_SIZE buffer costs 8KB of RAM (llext_buf in subsys/llext/shell.c).
# No workflow uses it: extensions load from /NAND:/ext automatically and the project's own
# `ext` shell commands (extension_host.cpp) cover extension debugging. Disabled in the
# issue #75 follow-up RAM pass; re-enable temporarily if a hex-load over UART is ever needed.
CONFIG_LLEXT_SHELL=n
# Generate an Extension Development Kit (EDK)
CONFIG_LLEXT_EDK=y
# Extensions only ever run on the sandboxed K_USER host thread (issue #85), so the
# EDK ships userspace-only syscall trampolines.
CONFIG_LLEXT_EDK_USERSPACE_ONLY=y

# Battery monitoring BLE service (issue #97): battery/VBUS voltage+current,
# charge status, and a persisted charging enable/disable toggle. Proto0 only —
# new features are enabled here per fw/CLAUDE.md's hardware-revision policy.
# WAKE_N (P0.02, shared with BQ25792 /QON) is defective on proto0 — line reads
# stuck-low; via the SENSE/PORT-event fallback it caused an unbounded GPIOTE
# interrupt storm on 9V PD input (2026-07-13). Known hardware defect.
CONFIG_APP_WAKE_BUTTON=n
CONFIG_APP_CHARGER_POLICY=y
CONFIG_APP_BATTERY_MONITOR=y
# Power Debug BLE service (power plan PR E): IINDPM readback, power flags,
# PD source/budget, ICO result — surfaced on the app's battery detail page.
CONFIG_APP_POWER_DEBUG_SERVICE=y

# Sandboxed animation extension host (issue #85): discovers /NAND:/ext/*.llext and
# runs them on a K_USER thread in per-extension memory domains.
CONFIG_APP_EXTENSION_HOST=y
# Extension GATT services are assembled at runtime (one service per discovered
# extension, see src/extensions/extension_bt.cpp) — needs the dynamic GATT database.
CONFIG_BT_GATT_DYNAMIC_DB=y

# Kernel/user mode separation (issue #79). Motivated by future LLEXT animations needing
# to run sandboxed so a bad extension can't take down the whole system, plus general
# crash isolation. Cortex-M33's MPU on this SoC supports it (ARCH_HAS_USERSPACE is
# selected for ARM_MPU). Complementary to CONFIG_HW_STACK_PROTECTION, not conflicting.
# Fits only after the issue #79 flash-reduction pass freed ~148KB (see prj.conf /
# bt_service_cpp.h). proto0-only: the legacy DK board's flash budget was far too tight.
# A "Service N not found" BT GATT regression was seen once with this + the
# bt_service_cpp.h tuple_cat change both active, following a pairing timeout after a
# bond wipe. Hardware-verified across two clean cycles since (a fresh pairing and a
# bonded reconnect, the latter being the closer match to the original trigger) with no
# repro -- best theory is it was a one-off tied to the pairing-timeout/stale-bond
# condition itself, not a regression from either code change.
CONFIG_USERSPACE=y
# Default (2 bytes = 16 threads max) is too small for this project's ~26 threads; the
# build itself reports "Too many thread objects" and suggests this value.
CONFIG_MAX_THREAD_BYTES=4

# Root-caused via GDB+SWD (JLinkGDBServer + arch-zephyr-eabi-gdb attached directly to the
# halted CPU over SWD -- USB never enumerates so no serial/log output was possible): the
# NCS-owned udc_nrfx USB driver thread (Kconfig default 512B, already at 79% utilization
# in the baseline build per the issue #75 RAM investigation) stack-overflows during its
# own boot-time setup once CONFIG_USERSPACE's extra heap-allocation bookkeeping
# (sys_heap_aligned_alloc, seen in the fault backtrace) adds depth to that code path --
# a K_ERR_STACK_CHK_FAIL hard fault that halts the CPU (RESET_ON_FATAL_ERROR is off)
# before the USB stack the crashing thread belongs to can ever finish enumerating.
CONFIG_UDC_NRF_THREAD_STACK_SIZE=1024

CONFIG_STATUS_LED=y

CONFIG_BT_DEVICE_NAME="RGB Sunglasses Proto0"

CONFIG_ANIMATION_GLIM_PLAYER=y

CONFIG_THREAD_MONITOR=y
CONFIG_MCUMGR_GRP_OS_TASKSTAT=y
CONFIG_MCUMGR_GRP_OS_TASKSTAT_STACK_INFO=y

# CONFIG_MCUMGR_GRP_STAT is deliberately not enabled: it depends on
# CONFIG_STATS, which nothing in this app defines counters for, so enabling
# the pair would only add flash for an empty `stat list`. The old
# CONFIG_MCUMGR_GRP_STAT=y line here never took effect (STATS=n) and just
# produced a Kconfig warning (issue #164).

# Larger SMP buffers so taskstat can encode all threads without hitting EMSGSIZE.
# Zephyr's own default (384 B x 4 bufs) is too small for 20+ threads with stack info + names.
# Verified against a real taskstat response (issue #75): 1518 B on the wire for 22 threads.
# 2048 B leaves ~35% margin. UART_MTU must satisfy UART_MTU <= NETBUF_SIZE + 2 (see
# Kconfig.uart help text) -- kept equal to NETBUF_SIZE since it doesn't allocate its own
# buffer (just a reported/logical MTU value, see subsys/mgmt/mcumgr/transport/src/smp_uart.c).
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=2048
CONFIG_MCUMGR_TRANSPORT_UART_MTU=2048

CONFIG_NCS_APPLICATION_BOOT_BANNER_STRING="RGB Sunglasses Proto0 (CPUAPP)"
# Retention boot-mode register (gpregret2) — lets the BLE bootloader updater
# call bootmode_set(BOOT_MODE_UPDATER_REQ) before rebooting, so MCUboot's
# fprotect_hook can skip SPU protection and the app can confirm it via
# bootmode_check(BOOT_MODE_UPDATER_ACTIVE).  See fw/mcuboot_hooks/fprotect_hook.c.
CONFIG_RETENTION_BOOT_MODE=y

# Advertise the 9V/3A sink PDO alongside 5V (the 9V-capable ACT bundle,
# misc/tps25750/tps25750-config-9v.c — one byte differs from stock:
# TX_SINK_CAPS numValidPDOs 1 -> 2, unmasking the already-present 9V PDO).
# Without this the TPS25750 never requests 9V from a capable charger, and a
# droopy 5V rail folds intake at the 4600mV VINDPM floor ("Input Voltage
# Limited", ~4W — observed on a 27W bank, 2026-07-17). The charger policy
# derives IINDPM/VINDPM from whatever contract lands; VAC_OVP is 26V.
# NOTE: the TPS25750 only loads a bundle in PTCH mode — after flashing, a
# full power-cycle (USB AND battery removed) is required for the new sink
# caps to take effect (see the APP_TPS25750_CONFIG_9V Kconfig help).
CONFIG_APP_TPS25750_CONFIG_9V=y
