# Proto0-specific Kconfig overrides.
# Picked up automatically by west build when targeting rgb_sunglasses_proto0/nrf5340/cpuapp.

# BMI270 6-axis IMU (not present on rgb_sunglasses_dk)
CONFIG_SENSOR=y
CONFIG_BMI270=y
CONFIG_BMI270_TRIGGER_OWN_THREAD=y
CONFIG_IMU=y
CONFIG_ANIMATION_TILT=y

# MX25R6435F QSPI NOR flash (not present on rgb_sunglasses_dk)
CONFIG_NORDIC_QSPI_NOR=y
# PM_DEVICE required for deep-power-down (has-dpd in DTS)
CONFIG_PM_DEVICE=y

CONFIG_FLASH_SHELL=y

# FAT filesystem on the external QSPI flash, exposed via USB Mass Storage.
# The flash disk driver wires the fat_partition DTS node to the "NAND" disk;
# CONFIG_USBD_MSC_CLASS registers it as a composite USB MSC interface alongside
# the two existing CDC ACM interfaces (console + mcumgr).
# CONFIG_FS_FATFS_MOUNT_MKFS auto-formats the partition on first mount.
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_MOUNT_MKFS=y
CONFIG_DISK_DRIVER_FLASH=y

# Long File Name support is needed for filenames longer than 12 characters
# Default buffer supports filenames up to 255 characters
CONFIG_FS_FATFS_LFN=y

# USBD Next Mass Storage Class. Replaces the old CONFIG_USB_MASS_STORAGE.
# The LUN name ("NAND") and disk binding are configured in src/usb/usb_init.c.
CONFIG_USBD_MSC_CLASS=y

# The MX25R6435F has a 4 KB erase page, so the SCSI buffer and FAT sector size
# must both be at least 4096 bytes to avoid sub-page writes.
CONFIG_USBD_MSC_SCSI_BUFFER_SIZE=4096

# The UDC net_buf pool must be large enough for the MSC SCSI transfer buffer
# (4096 bytes) plus simultaneous CDC ACM and control endpoint transfers.
# The default of 1024 is far too small: MSC allocates a single 4095-byte
# net_buf that can never be satisfied, causing every control transfer to fail
# and the host to reset the device in a loop.
CONFIG_UDC_BUF_POOL_SIZE=8192

# The default FATFS sector size is 512 bytes, but the MX25R6435F has a 4KB page size.
# Sector Size == Page Size for flash-backed FAT FS
CONFIG_FS_FATFS_MAX_SS=4096

CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_FILE_SYSTEM_MKFS=y

# Enable audio subsystem support
CONFIG_AUDIO=y

# Enable the generic PDM / DMIC interface
CONFIG_AUDIO_DMIC=y

# Enable support for dumping all device registers to the Shell. Memory hungry but we have memory to spare.
CONFIG_DUMP_DEVICE_REGISTERS=y

# Enable sensor support + streaming support
CONFIG_SENSOR_SHELL=y
CONFIG_SENSOR_SHELL_STREAM=y

CONFIG_DEBUG=y
CONFIG_DEBUG_INFO=y
CONFIG_DEBUG_OPTIMIZATIONS=y
CONFIG_STACK_USAGE=y
CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_INIT_STACKS=y

# Oh god do we ever need this
# CONFIG_SIZE_OPTIMIZATIONS_AGGRESSIVE=y
# CONFIG_SIZE_OPTIMIZATIONS=y

CONFIG_HW_STACK_PROTECTION=y

CONFIG_STACK_USAGE=y

CONFIG_DEBUG_COREDUMP_MEMORY_DUMP_THREADS=y
CONFIG_DEBUG_COREDUMP_THREADS_METADATA=y

CONFIG_FPU=y
CONFIG_FPU_SHARING=y

CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_TRANSFORM=y
CONFIG_CMSIS_DSP_COMPLEXMATH=y
CONFIG_CMSIS_DSP_STATISTICS=y
CONFIG_CMSIS_DSP_WINDOW=y

CONFIG_LLEXT=y
# No runtime code currently allocates from this heap (parked for the loadable-extensions
# branch) -- left at Zephyr's own default rather than the previous 2x bump.
CONFIG_LLEXT_HEAP_SIZE=8
CONFIG_LLEXT_SHELL=y
# Generate an Extension Development Kit (EDK)
CONFIG_LLEXT_EDK=y

CONFIG_STATUS_LED=y

CONFIG_BT_DEVICE_NAME="RGB Sunglasses Proto0"

CONFIG_ANIMATION_GLIM_PLAYER=y

CONFIG_THREAD_MONITOR=y
CONFIG_MCUMGR_GRP_OS_TASKSTAT=y
CONFIG_MCUMGR_GRP_OS_TASKSTAT_STACK_INFO=y

CONFIG_MCUMGR_GRP_STAT=y

# Larger SMP buffers so taskstat can encode all threads without hitting EMSGSIZE.
# Zephyr's own default (384 B x 4 bufs) is too small for 20+ threads with stack info + names.
# Verified against a real taskstat response (issue #75): 1518 B on the wire for 22 threads.
# 2048 B leaves ~35% margin. UART_MTU must satisfy UART_MTU <= NETBUF_SIZE + 2 (see
# Kconfig.uart help text) -- kept equal to NETBUF_SIZE since it doesn't allocate its own
# buffer (just a reported/logical MTU value, see subsys/mgmt/mcumgr/transport/src/smp_uart.c).
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=2048
CONFIG_MCUMGR_TRANSPORT_UART_MTU=2048

CONFIG_NCS_APPLICATION_BOOT_BANNER_STRING="RGB Sunglasses Proto0 (CPUAPP)"
# Retention boot-mode register (gpregret2) — lets the BLE bootloader updater
# call bootmode_set(BOOT_MODE_UPDATER_REQ) before rebooting, so MCUboot's
# fprotect_hook can skip SPU protection and the app can confirm it via
# bootmode_check(BOOT_MODE_UPDATER_ACTIVE).  See fw/mcuboot_hooks/fprotect_hook.c.
CONFIG_RETENTION_BOOT_MODE=y
