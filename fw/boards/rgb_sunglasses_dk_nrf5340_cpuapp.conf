# DK-specific Kconfig overrides.
# Picked up automatically by west build when targeting rgb_sunglasses_dk/nrf5340/cpuapp.

# Enable statistics commands
# Disabled to save ROM
CONFIG_MCUMGR_GRP_STAT=n

# Enable shell-over-MCUmgr
# Disabled to save ROM
CONFIG_MCUMGR_GRP_SHELL=n

# Enable zephyr basic commands
# Disabled to save ROM
CONFIG_MCUMGR_GRP_ZBASIC=n

# Enable settings management
# Disabled to save ROM
CONFIG_MCUMGR_GRP_SETTINGS=n

# Enable SMP OS management group commands
# Disabled to save ROM
CONFIG_MCUMGR_GRP_OS=n
CONFIG_MCUMGR_GRP_OS_INFO=n
CONFIG_MCUMGR_GRP_OS_ECHO=n
CONFIG_MCUMGR_GRP_OS_TASKSTAT=n

# Enable file-system management group commands
# TODO: recommended to implement ACLs using MCUMGR_GRP_FS_FILE_ACCESS_HOOK
CONFIG_MCUMGR_GRP_FS=n

# Disable shell commands that are not needed
CONFIG_CLOCK_CONTROL_NRF_SHELL=n
CONFIG_DEVICE_SHELL=n
CONFIG_DEVMEM_SHELL=n
CONFIG_FLASH_SHELL=n

# Minimize Shell memory usage
CONFIG_SHELL_MINIMAL=y

# Enable the microphone driver
CONFIG_VM3011=y

# Enable audio subsystem support
CONFIG_AUDIO=n

# Enable the generic PDM / DMIC interface
CONFIG_AUDIO_DMIC=n

CONFIG_FPU=y
CONFIG_FPU_SHARING=y

CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_TRANSFORM=y
CONFIG_CMSIS_DSP_COMPLEXMATH=y
CONFIG_CMSIS_DSP_STATISTICS=y
CONFIG_CMSIS_DSP_WINDOW=y

# CONFIG_DEBUG=y
# CONFIG_DEBUG_OPTIMIZATIONS=y

# Oh god do we ever need this
# CONFIG_SIZE_OPTIMIZATIONS_AGGRESSIVE=y
CONFIG_SIZE_OPTIMIZATIONS=y

# Persisting BT-settable config (see fw/Kconfig: APP_PERSIST_BT_CONFIG) doesn't fit in this
# board's internal-flash image slot, which is already near its limit; DK is legacy and
# doesn't get new features per fw/CLAUDE.md.
CONFIG_APP_PERSIST_BT_CONFIG=n

# Same flash-budget reasoning as APP_PERSIST_BT_CONFIG above: the bulk metadata
# characteristic (fw/Kconfig: APP_BT_METADATA_CHARACTERISTIC) duplicates every
# characteristic's CUD description string as packed binary data, which pushed this
# board's image past its slot size (confirmed: imgtool "Image size ... exceeds requested
# size" with this enabled). DK is legacy and doesn't get new features per fw/CLAUDE.md.
CONFIG_APP_BT_METADATA_CHARACTERISTIC=n

CONFIG_BT_DEVICE_NAME="RGB Sunglasses DK"