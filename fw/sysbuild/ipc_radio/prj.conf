CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_MBOX=y
CONFIG_IPC_SERVICE=y

CONFIG_BT=y
CONFIG_BT_HCI_RAW=y
CONFIG_BT_CTLR_ASSERT_HANDLER=y
# fw/src/bluetooth.cpp's state machine is hard single-connection (a second
# NEW_CONNECTION while ADVERTISING/CONNECTING/CONNECTED is explicitly
# rejected, see its ADVERTISING-state handler), and the appcore host side
# already defaults to BT_MAX_CONN=1 (nothing there raises it). The old =16
# here was unmodified boilerplate carried over from Nordic's ipc_radio sample
# with no project-specific reason. =2 keeps one spare slot for the brief
# overlap during a disconnect/reconnect race; it also frees enough netcore
# RAM (BT_BUF_ACL_RX_COUNT_EXTRA scales with this) to afford real DLE below.
CONFIG_BT_MAX_CONN=2

# Enable and adjust the below value as necessary
# CONFIG_BT_BUF_EVT_RX_COUNT=16
# CONFIG_BT_BUF_EVT_RX_SIZE=255
# CONFIG_BT_BUF_CMD_TX_SIZE=255

# Large Bluetooth data packets (251-byte DLE, speeds up DFU over Bluetooth).
# CONFIG_BT_CTLR_DATA_LENGTH_MAX (zephyr/subsys/bluetooth/controller/Kconfig)
# depends on BT_CTLR_DATA_LENGTH, which depends on BT_DATA_LEN_UPDATE &&
# BT_CTLR_DATA_LEN_UPDATE_SUPPORT — the latter is already selected by
# BT_LL_SOFTDEVICE itself, so this is NOT a BT_LL_SW_SPLIT-only symbol as
# issue #164's original comment claimed. The real blocker was
# BT_DATA_LEN_UPDATE, which only defaults to y once an ACL buffer exceeds 27
# bytes (zephyr/subsys/bluetooth/Kconfig) — raising the ACL sizes below
# unlocks it. Matches Nordic's own reference ipc_radio configs, e.g.
# nrf/samples/bluetooth/throughput/sysbuild/ipc_radio/prj.conf, and the
# appcore side already assumes this (fw/prj.conf's BT_BUF_ACL_TX_SIZE=502 /
# BT_L2CAP_TX_MTU=498). Needed BT_MAX_CONN lowered above first — at 16
# connections this overflowed netcore RAM by ~2.4KB even at these minimum
# sizes (BT_BUF_ACL_RX_COUNT_EXTRA scales with BT_MAX_CONN).
CONFIG_BT_BUF_ACL_RX_SIZE=255
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# Match the SoftDevice Controller's LL ACL TX buffer count to the appcore host's
# deepened TX pool (fw/prj.conf CONFIG_BT_BUF_ACL_TX_COUNT=8 -> BT_CONN_TX_MAX=8).
# The default 3 is what the controller reports to the host in LE Read Buffer Size,
# so a host with 8 conn-tx contexts logs "Num of Controller's ACL packets != ACL
# bt_conn_tx contexts (3 != 8)" at boot and can only ever have 3 packets in flight.
# Matching at 8 clears that warning and lets the bursty notifiers (battery/power
# services, Text) actually keep more than 3 ACL packets in flight per interval.
# Cost is netcore RAM only (8 x ~251B per connection); verified against the map to
# fit the cpunet's 64KB with margin.
CONFIG_BT_CTLR_SDC_TX_PACKET_COUNT=8

CONFIG_ASSERT=y
CONFIG_DEBUG_INFO=y

CONFIG_IPC_RADIO_BT=y
CONFIG_IPC_RADIO_BT_HCI_IPC=y

# Enable net core version reporting via IPC
CONFIG_NETCORE_VERSION_IPC=y
# SHA-256 for fw/ipc_radio/src/netcore_version.c's netcore-image fingerprint.
# Previously TinyCrypt (deprecated upstream, see issue #164); migrated to
# stock Zephyr mbedTLS (issue #181) since TinyCrypt's Kconfig unconditionally
# `select DEPRECATED`s. Deliberately NOT CONFIG_NRF_SECURITY/PSA crypto here:
# that path pulls in the full PSA key-slot/driver-dispatch core, real
# overhead this flash-tight (256KB) netcore can't spare for one hash call.
# CONFIG_MBEDTLS_SHA256 and CONFIG_MBEDTLS_SHA256_SMALLER (ROM-optimized
# variant) both default to y once CONFIG_MBEDTLS_BUILTIN is selected, so no
# other mbedTLS Kconfig is needed; kept explicit here for clarity/future-
# proofing against an upstream default change.
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_SHA256=y
CONFIG_MBEDTLS_SHA256_SMALLER=y
