# Declare the 32k sleep clock as 500ppm-class on proto0 (issue #188 hardware finding).
#
# The board's LFXO crystal is out of the accuracy class the controller assumed
# (~50-250ppm): with the tighter declaration, any LE connection whose interval was
# renegotiated to >= ~120ms deterministically died of supervision timeout ("Disconnected
# (reason 8)") exactly one supervision window after the update, on BOTH test phones
# (OnePlus 9 Pro / OxygenOS 14 AND Pixel 9 Pro / Android 16) - the peripheral's RX
# window widening (Core v5 Vol 6 Part B 4.5.7 - scales with interval x SCA) was too
# narrow to catch the anchor, so the radio never heard the central again. Intervals
# <= ~105ms survived (drift per event still inside the window). Declaring 500ppm makes
# the controller widen honestly; hardware-verified: the same 165ms/latency-2 link that
# died in <7s now runs indefinitely (incl. through a full SMP DFU cycle). Known Nordic
# failure mode - see the matching DevZone case cited in the issue-#188 PR verification notes.
#
# Follow-up (crystal load caps / board rework) tracked in its own issue; until the
# hardware is fixed this declaration is REQUIRED for the conn-param governor's SLOW set.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_500PPM=y
