# Proto0-specific mcuboot overrides.
#
# The proto0 board DTS exposes an enabled QSPI node (MX25R6435F), which causes
# CONFIG_NORDIC_QSPI_NOR to be auto-selected (default y). mcuboot needs the
# QSPI NOR driver because the secondary OTA slots will live on the external
# MX25R6435F flash. The driver adds ~4.5 KB to the mcuboot binary, so the
# mcuboot partition is enlarged from the shared default of 64 KB to 80 KB.
# The 16 KB is recovered many times over once secondary slots move to QSPI
# (freeing the ~384 KB internal-flash secondary slot + 120 KB scratch region).
#
# TODO: evaluate switching from RSA-2048 to ECDSA-P256 (CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256)
#       which would save 3-5 KB of MbedTLS crypto code and restore comfortable headroom.
CONFIG_NORDIC_QSPI_NOR=y
CONFIG_PM_PARTITION_SIZE_MCUBOOT=0x14000

# Primary slot is 880 KB (0xDC000 = 220 × 4 KB sectors — shrunk when the coredump
# partition was carved from the end of internal flash, issue #80). The default of
# 128 is too small; 256 covers the full slot with headroom for future growth.
CONFIG_BOOT_MAX_IMG_SECTORS=256

# Enter serial recovery (DFU) mode when button1 (sw1, P1.11) is held at boot.
# The mcuboot-button0 DTS alias already points to &button1.
# 500 ms hold prevents accidental entry on a normal power-on press.
CONFIG_BOOT_SERIAL_ENTRANCE_GPIO=y
CONFIG_BOOT_SERIAL_DETECT_DELAY=500

# Share MCUboot's own version with the app via retained SRAM (blinfo TLV).
# The app reads it via blinfo_lookup(BLINFO_BOOTLOADER_VERSION).
# Not enabled on rgb_sunglasses_dk: that board has no retained-SRAM DTS node,
# and the feature is gated by CONFIG_APP_MCUBOOT_INFO_SERVICE (see fw/Kconfig).
CONFIG_BOOT_SHARE_DATA=y
CONFIG_BOOT_SHARE_DATA_BOOTINFO=y
CONFIG_BOOT_SHARE_BACKEND_RETENTION=y
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y

# Disable MCUboot's built-in SPU write-protection call.  fprotect_hook.c
# (fw/mcuboot_hooks/) re-implements the same protection but reads the
# gpregret2 retention register first: a normal boot applies fprotect exactly
# as before; an updater-mode boot (app wrote BOOT_MODE_UPDATER_REQ=0xB1)
# skips it and sets BOOT_MODE_UPDATER_ACTIVE=0xB2 so the app can verify the
# region is writable.  The BLE update path still requires BT_SECURITY_L4 +
# two-step confirmation.
CONFIG_FPROTECT=n
CONFIG_BOOT_GO_HOOKS=y

# Retention subsystem — already enabled for BOOT_SHARE_BACKEND_RETENTION above,
# but also needed here for bootmode_check/set (zephyr,boot-mode on gpregret2).
CONFIG_RETENTION_BOOT_MODE=y
