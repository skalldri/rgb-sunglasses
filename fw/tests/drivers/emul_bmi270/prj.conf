CONFIG_ZTEST=y

CONFIG_SENSOR=y
CONFIG_SPI=y
CONFIG_GPIO=y

# The emulated bus/device layer (SPI_EMUL and GPIO_EMUL default to y on
# native_sim once their devicetree nodes exist; CONFIG_BMI270 defaults to y
# on the overlay's bosch,bmi270 node)
CONFIG_EMUL=y
CONFIG_EMUL_BMI270=y

# The bmi270 driver and the emulator both use CONFIG_SENSOR_LOG_LEVEL, which
# only exists when LOG is enabled
CONFIG_LOG=y
