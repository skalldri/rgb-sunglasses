CONFIG_ZTEST=y

# Enable C++ Language Support (the BQ25792 driver is C++)
CONFIG_CPP=y

# Enable support for C++23
CONFIG_STD_CPP2B=y

# Link against the C++ Standard Library
CONFIG_REQUIRES_FULL_LIBCPP=y

# Link against the C Standard Library
CONFIG_REQUIRES_FULL_LIBC=y

CONFIG_LOG=y

CONFIG_I2C=y

# Emulator framework; CONFIG_I2C_EMUL defaults to y once EMUL is on and the
# board's zephyr,i2c-emul-controller node (native_sim's i2c0) exists.
CONFIG_EMUL=y

# Real drivers under test (both default n; the overlay provides their nodes)
CONFIG_TPS25750=y
CONFIG_BQ25792=y

# The emulated TPS25750 they talk to
CONFIG_EMUL_TPS25750=y

# `power pd patch` (cmd_power_pd_patch) isn't in this suite's test scope
# (out of scope: needs a real patch blob + CONFIG_TPS25750_INTERNAL_PATCH
# machinery beyond what testing the other shell handlers needs), but
# power.cpp calls tps25750_get_patch() unconditionally in that handler, so
# it still has to be *compiled*: this is the same minimal config
# tests/power/tps25750_patch_decompression already proves works.
CONFIG_LZ4=y
CONFIG_TPS25750_INTERNAL_PATCH=y
CONFIG_TPS25750_COMPRESSED_PATCH=y
CONFIG_TPS25750_PATCH_HEADER_FILE="tps25750/tps25750-config-compressed.h"

# power.cpp's shell command handlers are the unit under test; drive them
# through the dummy backend (shell_execute_cmd), same pattern as
# tests/led_controller.
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_DUMMY=y

# Deliberately NOT set: CONFIG_APP_CHARGER_POLICY, CONFIG_APP_BATTERY_MONITOR,
# CONFIG_APP_POWER_DEBUG_SERVICE, CONFIG_STATUS_LED - see src/main.cpp's file
# comment for why (charger_status_thread_func's background reads must not
# also perform autonomous writes that could race this suite's own shell-driven
# writes).
