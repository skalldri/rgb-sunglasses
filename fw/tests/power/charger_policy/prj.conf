CONFIG_ZTEST=y

# Enable C++ Language Support (the BQ25792 driver + charger_policy are C++)
CONFIG_CPP=y

# Enable support for C++23
CONFIG_STD_CPP2B=y

# Link against the C++ Standard Library
CONFIG_REQUIRES_FULL_LIBCPP=y

# Link against the C Standard Library
CONFIG_REQUIRES_FULL_LIBC=y

CONFIG_LOG=y

CONFIG_I2C=y

# Emulator framework; CONFIG_I2C_EMUL defaults to y once EMUL is on and the
# board's zephyr,i2c-emul-controller node (native_sim's i2c0) exists.
CONFIG_EMUL=y

# Real drivers under test (both default n; the overlay provides their nodes)
CONFIG_TPS25750=y
CONFIG_BQ25792=y

# The emulated TPS25750 they talk to
CONFIG_EMUL_TPS25750=y

# The module under test (test-local Kconfig redeclaration — the test app does
# not source fw/Kconfig)
CONFIG_APP_CHARGER_POLICY=y
