CONFIG_ZTEST=y

# Enable C++ Language Support
CONFIG_CPP=y

# Enable support for C++23
CONFIG_STD_CPP2B=y

# Link against the C++ Standard Library
CONFIG_REQUIRES_FULL_LIBCPP=y

# Link against the C Standard Library
CONFIG_REQUIRES_FULL_LIBC=y

CONFIG_LOG=y

# Real BT host headers/symbols for the compile-time BtGattServer attribute
# tables (BT_GATT_SERVICE_DEFINE, via BT_GATT_SERVER_REGISTER). bt_enable() is
# never called in this test, so no HCI transport is exercised at runtime
# (same pattern as tests/bluetooth/battery_service).
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y

# BtGattPersistentCharacteristic's settings-subsystem registration path
# (same as tests/bluetooth/battery_service).
CONFIG_SETTINGS=y

# glim_registry / glim_decoder headers (glim_player_animation_bt.cpp).
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_DISK_ACCESS=y
CONFIG_FS_FATFS_LFN=y
CONFIG_HEAP_MEM_POOL_SIZE=16384
