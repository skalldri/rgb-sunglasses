CONFIG_ZTEST=y

# Enable C++ Language Support
CONFIG_CPP=y

# Enable support for C++23
CONFIG_STD_CPP2B=y

# Link against the C++ Standard Library
CONFIG_REQUIRES_FULL_LIBCPP=y

# Link against the C Standard Library
CONFIG_REQUIRES_FULL_LIBC=y

CONFIG_LOG=y

# Real BT host headers/symbols, including CONFIG_BT_GATT_DYNAMIC_DB for the
# bt_gatt_service_register()/unregister() runtime attribute-table path
# extension_bt.cpp uses. bt_enable() is never called in this test, so no HCI
# transport is exercised at runtime (same pattern as tests/bluetooth/battery_service).
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_GATT_SERVICE_CHANGED=y
CONFIG_BT_GATT_DYNAMIC_DB=y
