# WTF is going on in these functions...
# CONFIG_OUTPUT_DISASSEMBLY=y

# Enable C++ Language Support
CONFIG_CPP=y

# Enable support for C++23 (HELL YEAH!)
CONFIG_STD_CPP2B=y

# Link against the C++ Standard Library
CONFIG_REQUIRES_FULL_LIBCPP=y

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="RGB Sunglasses DK"

# Needed for GATT Long Write
CONFIG_BT_ATT_PREPARE_COUNT=4

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_BOOTLOADER_MCUBOOT=y

CONFIG_NRF53_UPGRADE_NETWORK_CORE=y

CONFIG_OUTPUT_PRINT_MEMORY_USAGE=y

CONFIG_SPI=y

CONFIG_LED=y

CONFIG_LED_STRIP=y

CONFIG_WS2812_STRIP_SPI=y

CONFIG_STACK_SENTINEL=y

# Old USB device stack has bugs in the mass storage class implementation
# Use the new USB device stack which has a much better USB MSC implementation.
#CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_STACK_NEXT=y

CONFIG_SERIAL=y

CONFIG_CONSOLE=y

CONFIG_UART_CONSOLE=y

CONFIG_UART_LINE_CTRL=y

# USBD Next CDC ACM class — auto-enabled by DT_HAS_ZEPHYR_CDC_ACM_UART_ENABLED,
# but listed explicitly for clarity. Replaces the old CONFIG_USB_CDC_ACM.
CONFIG_USBD_CDC_ACM_CLASS=y

# Hardware info provides a unique USB serial number from the device FICR.
CONFIG_HWINFO=y

CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
# Unused and takes space
# CONFIG_LOG_RUNTIME_FILTERING=y
CONFIG_LOG_BUFFER_SIZE=8192

CONFIG_DEBUG_COREDUMP=y

CONFIG_DEBUG_COREDUMP_BACKEND_LOGGING=y

# Enable thread performance monitoring
CONFIG_THREAD_MONITOR=y

# Enable the home-built TPS25750 USB Power Delivery controller driver
CONFIG_TPS25750=y

# Need I2C to talk to various components
CONFIG_I2C=y

CONFIG_FLASH=y

# Enable the home-built BQ25792 battery charger driver
CONFIG_BQ25792=y

# Enable a shell that will let us debug the NVM settings
CONFIG_SETTINGS_SHELL=y

# Needed to make LEDs go brr
CONFIG_SPI_ASYNC=y
CONFIG_POLL=y

# Allow for large Bluetooth data packets.
# This speeds up DFU over Bluetooth.
CONFIG_BT_L2CAP_TX_MTU=498
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=502

# Enable the Shell
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y

# Enable the LittleFS file system.
# Disabled to save ROM
# CONFIG_FILE_SYSTEM=y
# CONFIG_FILE_SYSTEM_LITTLEFS=y

# Disable Bluetooth ping support
# CONFIG_BT_CTLR_LE_PING=n

# Non-zero heap is required for libmetal to be able to allocate
CONFIG_KERNEL_MEM_POOL=y
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Save A LOT of memory! ~30KB
CONFIG_ASSERT=n


# Save generated pre-processed files
# Helpful for debugging macro expansion issues
# CONFIG_COMPILER_SAVE_TEMPS=y

# For decompressing the TPS25750 patch
CONFIG_LZ4=y

CONFIG_TPS25750_INTERNAL_PATCH=y
CONFIG_TPS25750_COMPRESSED_PATCH=y
CONFIG_TPS25750_PATCH_HEADER_FILE="tps25750/tps25750-config-compressed.h"

# Include reboot API
CONFIG_REBOOT=y

### MCUmgr
# Originally: 
CONFIG_NCS_SAMPLE_MCUMGR_BT_OTA_DFU=y

# Needed by MCUMgr
CONFIG_ZCBOR=y

# Enable MCUmgr
CONFIG_MCUMGR=y

# Enable MCUmgr over UART
# In the board file, we assign this to a USB-CDC UART
CONFIG_MCUMGR_TRANSPORT_UART=y

# Needed by CONFIG_MCUMGR_TRANSPORT_UART
CONFIG_BASE64=y

# Enable MCUmgr over Bluetooth
CONFIG_MCUMGR_TRANSPORT_BT=y

CONFIG_MCUMGR_TRANSPORT_BT_CONN_PARAM_CONTROL=y
CONFIG_MCUMGR_TRANSPORT_BT_REASSEMBLY=y

# Require encryption for access
# CONFIG_MCUMGR_TRANSPORT_BT_PERM_RW_ENCRYPT=y

# Require encryption and authentication for access
# CONFIG_MCUMGR_TRANSPORT_BT_PERM_RW_AUTHEN=y

# Enable DFU image management commands
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUMGR_GRP_IMG=y

# Enable enumeration commands (querying supported command groups)
CONFIG_MCUMGR_GRP_ENUM=y

# Needs to be large since some global variable initialization requires very deep stacks
CONFIG_MAIN_STACK_SIZE=32768